# cargo-deny configuration for solstone-windows.
#
# Three jobs:
#   1. License gate  — this is AGPL-3.0-only; deps must be AGPL-compatible/permissive.
#   2. Privacy denylist — the data covenant in code: no analytics, telemetry,
#      tracking, crash-reporting, or phone-home crates may ever enter the graph.
#   3. Pure-tier purity — the `windows` family must never reach the pure crates
#      (gated by `cargo xtask purity-check`; see the note under [bans]).
#
# `make ci` checks bans/licenses/sources offline against the locked graph.
# `make audit` refreshes RustSec data and checks advisories separately.

[graph]
all-features = true

[licenses]
# Allow our own license plus the common permissive deps an AGPL project may consume.
allow = [
    "AGPL-3.0-only",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
    "Unlicense",
    "CC0-1.0",
    # via velopack -> ureq -> webpki-roots (Mozilla CA bundle; permissive).
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true

# ── Privacy denylist (the data covenant, encoded) ────────────────────────────
# solstone never ships analytics, telemetry, behavioral tracking, crash
# reporting, or phone-home. These crates (and their wrappers) are banned at the
# dependency-graph level so a transitive pull-in fails `cargo deny check`.
deny = [
    # crash reporters / error-tracking SaaS
    { name = "sentry" },
    { name = "sentry-core" },
    { name = "sentry-types" },
    { name = "rollbar" },
    { name = "bugsnag" },
    { name = "honeycomb" },
    # product / behavioral analytics SDKs
    { name = "segment" },
    { name = "analytics" },
    { name = "amplitude" },
    { name = "mixpanel" },
    { name = "posthog" },
    { name = "posthog-rs" },
    { name = "rudderanalytics" },
    { name = "google-analytics" },
    { name = "ga4" },
    { name = "datadog" },
    { name = "datadog-apm" },
    { name = "opentelemetry-datadog" },
    { name = "newrelic" },
    { name = "appcenter" },
]

# ── Pure-tier purity ─────────────────────────────────────────────────────────
# The `windows` family is a quarantine, allowed ONLY in the platform-tier crates
# (capture-screen-encode, capture-wgc, capture-wasapi, platform-win,
# pl-transport-win) where it is declared target-gated.
# Pure-tier crates additionally carry `#![forbid(unsafe_code)]`, and the
# dependency arrows never point pure -> platform (the DAG rule in AGENTS.md
# §Source Layout). cargo-deny cannot scope a ban to a subset of workspace
# members, so purity is gated by `cargo xtask purity-check` instead: it runs
# `cargo tree --target all` over each pure crate and fails if the `windows`
# family appears (`--target all` is essential — the platform tier declares
# `windows` target-gated, so a leak is invisible to a host-target tree off
# Windows). Wired into both `make ci` and the remote mill gate (scripts/win-ci.cmd).

[advisories]
yanked = "warn"
# Unmaintained-crate advisories: only for crates we directly depend on. Tauri's
# Linux GUI backend (GTK3 bindings, unic-*) drags in many transitive crates the
# upstream has flagged unmaintained — we don't control them, there is no available
# upgrade, and the shipped product targets Windows/WebView2, not GTK3/Linux.
# Security vulnerabilities are still checked across the whole graph regardless.
unmaintained = "workspace"
# TEMPORARY, tracked for removal. Two DoS advisories against quick-xml 0.39.4,
# reachable ONLY transitively via plist <- tauri-utils <- the Tauri stack. The fix
# is quick-xml >=0.41.0, but as of 2026-07-03 no upstream release propagates it:
# plist 1.9.0 (the latest published plist) still pins `quick-xml = "^0.39.2"`, and
# tauri 2.11.2 (latest) rides that plist — so there is no registry path to the fix
# and a `[patch]` can't cross plist's semver requirement. Remove BOTH ids and verify
# the real bump (`cargo update -p plist` then `cargo update -p quick-xml`) once plist
# ships a release accepting quick-xml >=0.41. Not silenced globally — the whole graph
# is still gated; only these two known-transitive ids are waived.
ignore = [
    { id = "RUSTSEC-2026-0194", reason = "quick-xml 0.39.4 O(N^2) attribute dup-check DoS; transitive via plist<-Tauri; no upstream release with the >=0.41 fix yet (plist 1.9.0 pins ^0.39.2). Remove once plist bumps quick-xml. Owner: VPE." },
    { id = "RUSTSEC-2026-0195", reason = "quick-xml 0.39.4 unbounded namespace-decl growth DoS; transitive via plist<-Tauri; no upstream release with the >=0.41 fix yet (plist 1.9.0 pins ^0.39.2). Remove once plist bumps quick-xml. Owner: VPE." },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
required-git-spec = "rev"
